<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Engine</title>
  <link rel="stylesheet" href="assets/css/style.css">
  
</head>
<body>
  <div class="app">
    <div id="wave-field" aria-hidden="true">
      <svg id="emotion-waves" preserveAspectRatio="none"></svg>
    </div>
    
    <h1>Emotion Engine</h1>
    <p>Interactive groove generator based on emotional states</p>

    <div class="button-row" id="emotion-buttons"></div>

    <div class="status" id="status">Select up to 3 primary emotions</div>

    <div class="result" id="result"></div>

    <div class="controls">
      <button class="reset-btn" id="reset-button">Reset</button>
    </div>

    <p class="intro">
      Combine emotional states to generate rhythm and sound.
    </p>
  </div>

  <script src="assets/js/script.js" defer></script>
</body>
</html>
